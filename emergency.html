<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergency Medical Info</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#f1f5f9;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,Arial,sans-serif;min-height:100%}
  a{color:inherit}
  .emg-header{background:linear-gradient(135deg,#dc2626,#7f1d1d);color:#fff;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 12px rgba(0,0,0,.15);position:sticky;top:0;z-index:5;gap:12px;flex-wrap:wrap}
  .emg-header .lbl{font-size:12px;letter-spacing:2px;opacity:.9;font-weight:700}
  .emg-header .nm{font-size:22px;font-weight:800;margin-top:2px}
  .btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35);padding:8px 14px;border-radius:8px;cursor:pointer;font-weight:600;font-size:14px}
  .wrap{max-width:1000px;margin:20px auto;padding:0 16px}
  .card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 4px 12px rgba(0,0,0,.05);margin-top:14px}
  .card h2{font-size:15px;color:#0f172a;font-weight:800;text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #f1f5f9;display:flex;align-items:center;gap:8px}
  .card h2 .ico{font-size:18px}
  .kv{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px 16px}
  .kv .item{background:#f8fafc;border-radius:8px;padding:10px 12px;border-left:3px solid #cbd5e1}
  .kv .item .k{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#64748b;font-weight:700}
  .kv .item .v{font-size:15px;font-weight:700;color:#0f172a;margin-top:3px;word-break:break-word}
  .pills{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
  .pill{padding:10px 14px;border-radius:10px;min-width:120px}
  .pill .k{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#64748b;font-weight:700}
  .pill .v{font-size:15px;font-weight:700;color:#0f172a;margin-top:2px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px}
  @media (max-width:720px){ .grid2{grid-template-columns:1fr} }
  ul{padding-left:20px;color:#334155;line-height:1.65}
  .muted{color:#94a3b8;font-style:italic}
  .avatar{width:88px;height:88px;border-radius:50%;background:#fee2e2;color:#b91c1c;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;flex-shrink:0}
  .row{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
  .foot{margin:18px 0 30px;text-align:center;color:#64748b;font-size:12px;line-height:1.7}
  .sub{color:#64748b}
  .last{background:#f8fafc;padding:14px;border-radius:10px;border:1px solid #e2e8f0}
  .last .hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;color:#0f172a;font-weight:700;flex-wrap:wrap;gap:6px}
  .last .body{color:#334155;font-size:14px;line-height:1.75}
  .last .body div{margin-bottom:3px}
  .none{background:#f8fafc;padding:14px;border-radius:10px;border:1px dashed #cbd5e1;color:#94a3b8}
  .telbtn{color:#dc2626;font-weight:800;text-decoration:none;font-size:18px;display:inline-block;margin-top:6px}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;margin-left:6px}
  .badge.fit{background:#dcfce7;color:#166534}
  .badge.unfit{background:#fee2e2;color:#991b1b}
  .badge.warn{background:#fef3c7;color:#92400e}
  .list-block{margin-top:6px}
  .list-block .title{font-weight:700;color:#0f172a;margin-bottom:6px;font-size:14px}
  .alert-list li{color:#991b1b;font-weight:600}
  .chronic-list li{color:#92400e;font-weight:600}
  .med-list li{color:#1e40af;font-weight:600}
  @media print{ .no-print{display:none !important} body{background:#fff} .emg-header{position:static} .card{box-shadow:none;border:1px solid #e2e8f0;break-inside:avoid} }
</style>
</head>
<body>
<div id="root"><div class="wrap"><div class="card" style="text-align:center;padding:40px;color:#64748b;">Loading emergency info…</div></div></div>
<script>
(function(){
  var esc = function(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]);}); };
  var fmtDT = function(d){ try{ if(!d) return ''; return new Date(d).toLocaleString('en-GB'); } catch(_){ return String(d||''); } };
  var fmtD  = function(d){ try{ if(!d) return ''; return new Date(d).toLocaleDateString('en-GB'); } catch(_){ return String(d||''); } };

  function fromB64Url(str){
    try {
      var b64 = str.replace(/-/g,'+').replace(/_/g,'/') + '==='.slice((str.length + 3) % 4);
      return JSON.parse(decodeURIComponent(escape(atob(b64))));
    } catch(e){ return null; }
  }

  function kvItem(label, val){
    return '<div class="item"><div class="k">'+esc(label)+'</div><div class="v">'+(val ? esc(val) : '<span class="muted">—</span>')+'</div></div>';
  }
  function pill(label, val, color){
    return '<div class="pill" style="background:'+(color||'#f1f5f9')+';"><div class="k">'+esc(label)+'</div><div class="v">'+esc(val||'—')+'</div></div>';
  }
  function listBlock(title, items, cssClass){
    return '<div class="list-block"><div class="title">'+esc(title)+'</div>'
      + ((items && items.length)
          ? '<ul class="'+(cssClass||'')+'">' + items.map(function(x){ return '<li>'+esc(x)+'</li>'; }).join('') + '</ul>'
          : '<div class="muted">None recorded</div>')
      + '</div>';
  }
  function lastCard(title, entry, fields){
    if (!entry) return '<div class="none">'+esc(title)+': none on record</div>';
    var rows = fields.map(function(f){ var v = entry[f[1]]; return v ? '<div><b>'+esc(f[0])+':</b> '+esc(v)+'</div>' : ''; }).filter(Boolean).join('');
    return '<div class="last"><div class="hd"><span>'+esc(title)+'</span><span class="sub" style="font-size:12px;">'+esc(fmtD(entry.date)||'')+'</span></div><div class="body">'+(rows || '<span class="muted">No details recorded</span>')+'</div></div>';
  }

  function fitnessBadge(mfs){
    if(!mfs) return '';
    var v = String(mfs).toLowerCase();
    var cls = 'warn';
    if(/(^|\W)(fit|passed|cleared|ok)(\W|$)/.test(v)) cls = 'fit';
    else if(/(unfit|failed|not.?fit)/.test(v)) cls = 'unfit';
    return '<span class="badge '+cls+'">'+esc(mfs)+'</span>';
  }

  function renderInvalid(msg){
    document.getElementById('root').innerHTML =
      '<div class="wrap"><div class="card" style="text-align:center;padding:40px;">'
      + '<div style="font-size:48px;color:#b91c1c;">⚠️</div>'
      + '<h1 style="margin-top:12px;color:#0f172a;">'+esc(msg||'Invalid QR data')+'</h1>'
      + '<p style="color:#64748b;margin-top:8px;">This QR does not contain valid emergency data.</p>'
      + '</div></div>';
  }

  function render(s){
    var ec = s.ec || {};
    var cnt = s.cnt || {};
    var scannedAt = new Date();
    document.title = 'Emergency Info - ' + (s.n || 'Worker');

    var header =
        '<div class="emg-header">'
      +   '<div><div class="lbl">EMERGENCY MEDICAL INFO</div><div class="nm">🚑 '+esc(s.n||'')+'</div></div>'
      +   '<div class="no-print" style="display:flex;gap:8px;">'
      +     '<button class="btn" onclick="window.print()">🖨️ Print</button>'
      +   '</div>'
      + '</div>';

    // Identity card
    var identity =
        '<div class="card">'
      +   '<div class="row">'
      +     '<div class="avatar">'+esc((s.n||'?').charAt(0).toUpperCase())+'</div>'
      +     '<div style="flex:1;min-width:220px;">'
      +       '<div style="font-size:24px;font-weight:800;color:#0f172a;">'+esc(s.n||'')+'</div>'
      +       '<div class="sub" style="font-size:15px;margin-top:3px;">'+esc(s.jt||s.j||'')+(s.dp?(' · '+esc(s.dp)):'')+'</div>'
      +       (s.co ? '<div class="sub" style="font-size:14px;margin-top:2px;">🏢 '+esc(s.co)+'</div>' : '')
      +     '</div>'
      +   '</div>'
      +   '<div class="kv" style="margin-top:16px;">'
      +     kvItem('Worker ID', s.id)
      +     kvItem('National ID', s.nid)
      +     kvItem('Nationality', s.nt)
      +     kvItem('Age', s.ag)
      +     kvItem('Phone', s.ph)
      +     kvItem('Site / Location', s.st)
      +     kvItem('Job', s.j)
      +     kvItem('Department', s.dp)
      +   '</div>'
      + '</div>';

    // Vitals / critical medical summary
    var vitals =
        '<div class="card">'
      +   '<h2><span class="ico">❤️</span> Critical Medical Summary '+fitnessBadge(s.mfs)+'</h2>'
      +   '<div class="pills">'
      +     pill('Blood Type', s.bt, '#fee2e2')
      +     pill('Blood Pressure', s.bp, '#fef3c7')
      +     pill('Blood Sugar', s.bs, '#dbeafe')
      +     pill('Fitness', s.mfs, '#f1f5f9')
      +   '</div>'
      +   '<div class="grid2" style="margin-top:14px;">'
      +     '<div>' + listBlock('⚠️ Allergies', s.al||[], 'alert-list') + '</div>'
      +     '<div>' + listBlock('🩺 Chronic Diseases', s.ch||[], 'chronic-list') + '</div>'
      +   '</div>'
      +   listBlock('💊 Current Medications', s.md||[], 'med-list')
      + '</div>';

    // Emergency contact
    var contact =
        '<div class="card">'
      +   '<h2><span class="ico">📞</span> Emergency Contact</h2>'
      +   ((ec.n || ec.p)
          ? ('<div style="color:#334155;line-height:1.7;font-size:15px;">'
              + '<div><b style="font-size:17px;">'+esc(ec.n||'—')+'</b>'+(ec.r?(' <span class="sub">· '+esc(ec.r)+'</span>'):'')+'</div>'
              + (ec.p ? ('<a class="telbtn" href="tel:'+esc(ec.p)+'">📞 '+esc(ec.p)+'</a>') : '')
              + '</div>')
          : '<div class="muted">No emergency contact recorded</div>')
      + '</div>';

    // Medical history
    var history =
        '<div class="card">'
      +   '<h2><span class="ico">📋</span> Medical History</h2>'
      +   '<div class="grid2">'
      +     lastCard('Last Physical Exam', s.lp, [['Result','result'],['Status','status'],['Notes','notes']])
      +     lastCard('Last Clinic Visit',  s.lc, [['Complaint','complaint'],['Diagnosis','diagnosis'],['Treatment','treatment']])
      +   '</div>'
      +   '<div style="margin-top:14px;">'
      +     lastCard('Last Injury Report', s.li, [['Type','type'],['Body part','body'],['Description','desc'],['Severity','severity']])
      +   '</div>'
      +   '<div class="kv" style="margin-top:14px;">'
      +     kvItem('Last Physical Exam Date', fmtD(s.lme))
      +     kvItem('Last Clinic Visit Date',  fmtD(s.lcv))
      +     kvItem('Last Injury Date',        fmtD(s.lid))
      +     kvItem('Physical Exams', cnt.p!=null?String(cnt.p):'')
      +     kvItem('Clinic Visits',  cnt.c!=null?String(cnt.c):'')
      +     kvItem('Injuries',       cnt.i!=null?String(cnt.i):'')
      +   '</div>'
      + '</div>';

    var footer =
        '<div class="foot">'
      +   '🕒 Scanned: <b>'+esc(fmtDT(scannedAt))+'</b>'
      +   (s.g   ? ' · QR generated: <b>'+esc(fmtDT(s.g))+'</b>' : '')
      +   (s.upd ? ' · Records updated: <b>'+esc(fmtDT(s.upd))+'</b>' : '')
      + '</div>';

    document.getElementById('root').innerHTML =
      header + '<div class="wrap">' + identity + vitals + contact + history + footer + '</div>';
  }

  function boot(){
    var h = location.hash || '';
    var m = h.match(/^#e=(.+)$/);
    if (!m){ renderInvalid('No emergency data in link'); return; }
    var data = fromB64Url(m[1]);
    if (!data){ renderInvalid('Invalid QR data'); return; }
    render(data);
  }
  window.addEventListener('hashchange', boot);
  boot();
})();
</script>
</body>
</html>
