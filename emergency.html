<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergency Medical Info</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#f1f5f9;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,Arial,sans-serif;min-height:100%;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .emg-header{background:linear-gradient(135deg,#dc2626,#7f1d1d);color:#fff;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 12px rgba(0,0,0,.15);position:sticky;top:0;z-index:5;gap:12px;flex-wrap:wrap}
  .emg-header .lbl{font-size:11px;letter-spacing:2.5px;opacity:.9;font-weight:700;text-transform:uppercase}
  .emg-header .nm{font-size:22px;font-weight:800;margin-top:4px;display:flex;align-items:center;gap:8px}
  .btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35);padding:8px 14px;border-radius:8px;cursor:pointer;font-weight:600;font-size:14px}
  .btn:hover{background:rgba(255,255,255,.25)}
  .wrap{max-width:1000px;margin:20px auto;padding:0 16px}
  .card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 4px 12px rgba(0,0,0,.05);margin-top:14px;border:1px solid #eef2f7}
  .card h2{font-size:14px;color:#0f172a;font-weight:800;text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #f1f5f9;display:flex;align-items:center;gap:10px}
  .card h2 .ico{font-size:18px}
  .kv{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
  .kv .item{background:#f8fafc;border-radius:10px;padding:10px 12px;border-left:3px solid #cbd5e1}
  .kv .item .k{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#64748b;font-weight:700}
  .kv .item .v{font-size:15px;font-weight:700;color:#0f172a;margin-top:3px;word-break:break-word}
  .pills{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .pill{padding:12px 14px;border-radius:10px;border:1px solid #eef2f7}
  .pill .k{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#64748b;font-weight:700}
  .pill .v{font-size:16px;font-weight:800;color:#0f172a;margin-top:3px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px}
  @media (max-width:720px){ .grid2,.pills{grid-template-columns:1fr} }
  ul{padding-left:20px;color:#334155;line-height:1.65}
  .muted{color:#94a3b8;font-style:italic}
  .avatar{width:88px;height:88px;border-radius:50%;background:#fee2e2;color:#b91c1c;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;flex-shrink:0;border:3px solid #fecaca}
  .row{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
  .foot{margin:18px 0 30px;text-align:center;color:#64748b;font-size:12px;line-height:1.7}
  .sub{color:#64748b}
  .last{background:#f8fafc;padding:14px;border-radius:10px;border:1px solid #e2e8f0;height:100%}
  .last .hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;color:#0f172a;font-weight:800;font-size:14px;flex-wrap:wrap;gap:6px}
  .last .body{color:#334155;font-size:14px;line-height:1.75}
  .last .body div{margin-bottom:3px}
  .none{background:#f8fafc;padding:14px;border-radius:10px;border:1px dashed #cbd5e1;color:#94a3b8;text-align:center}
  .telbtn{display:inline-flex;align-items:center;gap:8px;background:#dc2626;color:#fff;font-weight:800;text-decoration:none;font-size:16px;padding:10px 18px;border-radius:10px;margin-top:10px;box-shadow:0 4px 10px rgba(220,38,38,.25)}
  .telbtn:hover{background:#b91c1c}
  .list-block{margin-top:10px}
  .list-block .title{font-weight:800;color:#0f172a;margin-bottom:6px;font-size:13px;text-transform:uppercase;letter-spacing:.4px}
  .alert-list li{color:#991b1b;font-weight:600}
  .chronic-list li{color:#92400e;font-weight:600}
  .med-list li{color:#1e40af;font-weight:600}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:14px;padding-top:14px;border-top:1px dashed #e2e8f0}
  .stat{text-align:center;padding:8px 6px}
  .stat .n{font-size:20px;font-weight:800;color:#0f172a}
  .stat .l{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#64748b;font-weight:700;margin-top:2px}
  @media print{ .no-print{display:none !important} body{background:#fff} .emg-header{position:static} .card{box-shadow:none;border:1px solid #e2e8f0;break-inside:avoid} .telbtn{background:#fff;color:#dc2626;border:1px solid #dc2626;box-shadow:none} }
</style>
</head>
<body>
<div id="root"><div class="wrap"><div class="card" style="text-align:center;padding:40px;color:#64748b;">Loading emergency info…</div></div></div>
<script>
(function(){
  var esc = function(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]);}); };
  var fmtDT = function(d){ try{ if(!d) return ''; return new Date(d).toLocaleString('en-GB'); } catch(_){ return String(d||''); } };
  var fmtD  = function(d){ try{ if(!d) return ''; return new Date(d).toLocaleDateString('en-GB'); } catch(_){ return String(d||''); } };

  function fromB64Url(str){
    try {
      var b64 = str.replace(/-/g,'+').replace(/_/g,'/') + '==='.slice((str.length + 3) % 4);
      return JSON.parse(decodeURIComponent(escape(atob(b64))));
    } catch(e){ return null; }
  }

  function kvItem(label, val){
    return '<div class="item"><div class="k">'+esc(label)+'</div><div class="v">'+(val ? esc(val) : '<span class="muted">—</span>')+'</div></div>';
  }
  function pill(label, val, color){
    return '<div class="pill" style="background:'+(color||'#f8fafc')+';"><div class="k">'+esc(label)+'</div><div class="v">'+esc(val||'—')+'</div></div>';
  }
  function listBlock(title, items, cssClass){
    return '<div class="list-block"><div class="title">'+esc(title)+'</div>'
      + ((items && items.length)
          ? '<ul class="'+(cssClass||'')+'">' + items.map(function(x){ return '<li>'+esc(x)+'</li>'; }).join('') + '</ul>'
          : '<div class="muted">None recorded</div>')
      + '</div>';
  }
  // Friendly labels for known keys (supports multiple naming conventions from the QR generator)
  var FIELD_LABELS = {
    result:'Result', status:'Status', notes:'Notes', note:'Notes', remarks:'Remarks',
    complaint:'Complaint', symptoms:'Symptoms', diagnosis:'Diagnosis', treatment:'Treatment',
    medication:'Medication', medications:'Medications', prescription:'Prescription',
    doctor:'Doctor', physician:'Physician', clinic:'Clinic', hospital:'Hospital',
    type:'Type', body:'Body Part', bodyPart:'Body Part', part:'Body Part',
    desc:'Description', description:'Description', details:'Details',
    severity:'Severity', cause:'Cause', location:'Location', site:'Site',
    outcome:'Outcome', followup:'Follow-up', follow_up:'Follow-up',
    reportId:'Report ID', id:'Report ID', ref:'Reference', refNo:'Reference',
    bp:'Blood Pressure', bs:'Blood Sugar', hr:'Heart Rate', temp:'Temperature', weight:'Weight', height:'Height'
  };
  function humanize(k){ return FIELD_LABELS[k] || k.replace(/[_-]+/g,' ').replace(/([a-z])([A-Z])/g,'$1 $2').replace(/^./, function(c){return c.toUpperCase();}); }
  function fmtVal(v){
    if (v == null || v === '') return '';
    if (Array.isArray(v)) return v.map(function(x){ return typeof x==='object' ? JSON.stringify(x) : String(x); }).join(', ');
    if (typeof v === 'object') {
      return Object.keys(v).map(function(k){ var vv = v[k]; return (vv==null||vv==='')?'':(humanize(k)+': '+(typeof vv==='object'?JSON.stringify(vv):String(vv))); }).filter(Boolean).join(' · ');
    }
    return String(v);
  }
  function lastCard(title, entry){
    if (!entry || (typeof entry === 'object' && !Array.isArray(entry) && Object.keys(entry).length === 0)) {
      return '<div class="none">'+esc(title)+': none on record</div>';
    }
    // Support array of reports: show most recent (first) with a count
    var count = 0, item = entry;
    if (Array.isArray(entry)) { count = entry.length; item = entry[0] || {}; }
    if (typeof item !== 'object') item = { details: item };

    var dateVal = item.date || item.d || item.when || item.createdAt || item.created_at || item.reportedAt || '';
    var skipKeys = {date:1,d:1,when:1,createdAt:1,created_at:1,reportedAt:1};
    var rows = Object.keys(item).map(function(k){
      if (skipKeys[k]) return '';
      var v = fmtVal(item[k]);
      return v ? '<div><b>'+esc(humanize(k))+':</b> '+esc(v)+'</div>' : '';
    }).filter(Boolean).join('');

    var badge = count > 1 ? ' <span class="sub" style="font-size:11px;">('+count+' reports)</span>' : '';
    return '<div class="last"><div class="hd"><span>'+esc(title)+badge+'</span>'
      + '<span class="sub" style="font-size:12px;font-weight:600;">'+esc(fmtD(dateVal)||'')+'</span></div>'
      + '<div class="body">'+(rows || '<span class="muted">No details recorded</span>')+'</div></div>';
  }

  function statBox(n, l){
    return '<div class="stat"><div class="n">'+esc(n||'—')+'</div><div class="l">'+esc(l)+'</div></div>';
  }

  function renderInvalid(msg){
    document.getElementById('root').innerHTML =
      '<div class="wrap"><div class="card" style="text-align:center;padding:40px;">'
      + '<div style="font-size:48px;color:#b91c1c;">⚠️</div>'
      + '<h1 style="margin-top:12px;color:#0f172a;">'+esc(msg||'Invalid QR data')+'</h1>'
      + '<p style="color:#64748b;margin-top:8px;">This QR does not contain valid emergency data.</p>'
      + '</div></div>';
  }

  function render(s){
    var cnt = s.cnt || {};
    var scannedAt = new Date();
    document.title = 'Emergency Info - ' + (s.n || 'Worker');

    var header =
        '<div class="emg-header">'
      +   '<div><div class="lbl">Emergency Medical Info</div><div class="nm">🚑 '+esc(s.n||'')+'</div></div>'
      +   '<div class="no-print" style="display:flex;gap:8px;">'
      +     '<button class="btn" onclick="window.print()">🖨️ Print</button>'
      +   '</div>'
      + '</div>';

    // Identity card
    var identity =
        '<div class="card">'
      +   '<div class="row">'
      +     '<div class="avatar">'+esc((s.n||'?').charAt(0).toUpperCase())+'</div>'
      +     '<div style="flex:1;min-width:220px;">'
      +       '<div style="font-size:24px;font-weight:800;color:#0f172a;">'+esc(s.n||'')+'</div>'
      +       '<div class="sub" style="font-size:15px;margin-top:4px;">'+esc(s.jt||s.j||'')+(s.dp?(' · '+esc(s.dp)):'')+'</div>'
      +       (s.co ? '<div class="sub" style="font-size:14px;margin-top:2px;">🏢 '+esc(s.co)+'</div>' : '')
      +       (s.ph ? ('<a class="telbtn" href="tel:'+esc(s.ph)+'">📞 '+esc(s.ph)+'</a>') : '')
      +     '</div>'
      +   '</div>'
      +   '<div class="kv" style="margin-top:18px;">'
      +     kvItem('Worker ID', s.id)
      +     kvItem('Nationality', s.nt)
      +     kvItem('Age', s.ag)
      +     kvItem('Site / Location', s.st)
      +     kvItem('Job', s.j)
      +     kvItem('Department', s.dp)
      +   '</div>'
      + '</div>';

    // Vitals / critical medical summary
    var vitals =
        '<div class="card">'
      +   '<h2><span class="ico">❤️</span> Critical Medical Summary</h2>'
      +   '<div class="pills">'
      +     pill('Blood Pressure', s.bp, '#fef3c7')
      +     pill('Blood Sugar', s.bs, '#dbeafe')
      +   '</div>'
      +   '<div class="grid2" style="margin-top:14px;">'
      +     '<div>' + listBlock('⚠️ Allergies', s.al||[], 'alert-list') + '</div>'
      +     '<div>' + listBlock('🩺 Chronic Diseases', s.ch||[], 'chronic-list') + '</div>'
      +   '</div>'
      +   listBlock('💊 Current Medications', s.md||[], 'med-list')
      + '</div>';

    // Medical history — accept multiple key names from the reports source
    var lp = s.lp || s.lastPhysical || s.physical || s.exams || s.pe;
    var lc = s.lc || s.lastClinic   || s.clinic   || s.visits || s.cv;
    var li = s.li || s.lastInjury   || s.injury   || s.injuries || s.ir;
    var history =
        '<div class="card">'
      +   '<h2><span class="ico">📋</span> Medical History</h2>'
      +   '<div class="grid2">'
      +     lastCard('Last Physical Exam', lp)
      +     lastCard('Last Clinic Visit',  lc)
      +   '</div>'
      +   '<div style="margin-top:14px;">'
      +     lastCard('Last Injury Report', li)
      +   '</div>'
      +   '<div class="stats">'
      +     statBox(cnt.p!=null?String(cnt.p):(Array.isArray(lp)?String(lp.length):''), 'Physical Exams')
      +     statBox(cnt.c!=null?String(cnt.c):(Array.isArray(lc)?String(lc.length):''), 'Clinic Visits')
      +     statBox(cnt.i!=null?String(cnt.i):(Array.isArray(li)?String(li.length):''), 'Injuries')
      +     statBox(fmtD(s.lme), 'Last Exam')
      +     statBox(fmtD(s.lcv), 'Last Visit')
      +     statBox(fmtD(s.lid), 'Last Injury')
      +   '</div>'
      + '</div>';


    var footer =
        '<div class="foot">'
      +   '🕒 Scanned: <b>'+esc(fmtDT(scannedAt))+'</b>'
      +   (s.g   ? ' · QR generated: <b>'+esc(fmtDT(s.g))+'</b>' : '')
      +   (s.upd ? ' · Records updated: <b>'+esc(fmtDT(s.upd))+'</b>' : '')
      + '</div>';

    document.getElementById('root').innerHTML =
      header + '<div class="wrap">' + identity + vitals + history + footer + '</div>';
  }

  function boot(){
    var h = location.hash || '';
    var m = h.match(/^#e=(.+)$/);
    if (!m){ renderInvalid('No emergency data in link'); return; }
    var data = fromB64Url(m[1]);
    if (!data){ renderInvalid('Invalid QR data'); return; }
    render(data);
  }
  window.addEventListener('hashchange', boot);
  boot();
})();
</script>
</body>
</html>
